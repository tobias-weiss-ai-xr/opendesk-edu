---
{{- if .Values.federation.enabled }}
{{- range $envKey, $envName := dict "dfnTest" "dfn-aai-test" "dfnProduction" "dfn-aai" }}
{{- $env := index $.Values.federation $envKey }}
{{- if and $env $env.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-dfn-aai-idp-config-{{ $envName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: saml-idp
    app.kubernetes.io/part-of: opendesk
    federation.environment: {{ $envKey }}
data:
  dfn-aai-idp-config.json: |
    {
      "alias": "{{ $env.alias | default $envName }}",
      "providerId": "saml",
      "enabled": true,
      "trustEmail": {{ $env.trustEmail | default true }},
      "firstBrokerLoginFlowAlias": "{{ $env.firstLoginFlow | default "first broker login" }}",
      "displayName": "{{ $env.displayName | default "Sign in with your institution" }}",
      "config": {
        "metadataDescriptorUrl": "{{ $env.metadataUrl }}",
        "entityId": "{{ $env.entityId | default (printf "https://id.%s/realms/%s" .Values.global.domain .Values.platform.realm) }}",
        "singleSignOnServiceUrl": "{{ $env.saml.ssoUrl | default (printf "https://%s/idp/profile/SAML2/Redirect/SSO" (ternary "test.aai.dfn.de" "www.aai.dfn.de" (eq $envKey "dfnTest"))) }}",
        {{- if $env.saml.logoutUrl }}
        "singleLogoutServiceUrl": "{{ $env.saml.logoutUrl }}",
        {{- end }}
        "nameIDPolicyFormat": "{{ $env.saml.nameIdFormat | default "urn:oasis:names:tc:SAML:2.0:nameid-format:persistent" }}",
        "principalType": "ATTRIBUTE",
        "principalAttribute": "urn:mace:dir:attribute-def:eduPersonTargetedID",
        "signatureAlgorithm": "RSA_SHA256",
        "wantAuthnRequestsSigned": "{{ $env.saml.wantAssertionsSigned | default "true" }}",
        "validateSignature": "{{ $env.saml.validateSignature | default "true" }}",
        "xmlSigKeyInfoKeyNameStrategy": "KEY_ID",
        "allowCreate": "true"
      }
    }
---
{{- end }}
{{- end }}
{{- end }}
