---
{{- if .Values.federation.enabled -}}
{{- if .Values.federation.dfnAai.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-dfn-aai-idp-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: saml-idp
    app.kubernetes.io/part-of: opendesk
data:
  dfn-aai-idp-config.json: |
    {
      "alias": "{{ .Values.federation.dfnAai.alias | default "dfn-aai" }}",
      "providerId": "saml",
      "enabled": true,
      "trustEmail": {{ .Values.federation.dfnAai.trustEmail | default true }},
      "firstBrokerLoginFlowAlias": "{{ .Values.federation.dfnAai.firstLoginFlow | default "first broker login" }}",
      "displayName": "{{ .Values.federation.dfnAai.displayName | default "Sign in with your institution" }}",
      "config": {
        {{- if .Values.federation.dfnAai.testMode }}
        "metadataDescriptorUrl": "{{ .Values.federation.dfnAai.testMetadataUrl | default "https://www.aai.dfn.de/fileadmin/metadata/dfn-aai-test-metadata.xml" }}",
        {{- else }}
        "metadataDescriptorUrl": "{{ .Values.federation.dfnAai.prodMetadataUrl | default "https://www.aai.dfn.de/fileadmin/metadata/dfn-aai-basic-metadata.xml" }}",
        {{- end }}
        "entityId": "{{ .Values.federation.dfnAai.entityId }}",
        "singleSignOnServiceUrl": "{{ .Values.federation.dfnAai.ssoUrl }}",
        {{- if .Values.federation.dfnAai.sloUrl }}
        "singleLogoutServiceUrl": "{{ .Values.federation.dfnAai.sloUrl }}",
        {{- end }}
        "nameIDPolicyFormat": "urn:oasis:names:tc:SAML:2.0:nameid-format:persistent",
        "principalType": "ATTRIBUTE",
        "principalAttribute": "urn:mace:dir:attribute-def:eduPersonTargetedID",
        "signatureAlgorithm": "RSA_SHA256",
        "wantAuthnRequestsSigned": "true",
        "validateSignature": "true",
        "xmlSigKeyInfoKeyNameStrategy": "KEY_ID",
        "allowCreate": "true"
      }
    }
{{- end }}
{{- end }}
