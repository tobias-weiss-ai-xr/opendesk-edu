apiVersion: v2
name: semester-provisioning
description: |
  Semester Lifecycle Management for openDesk Edu.
  Automates course provisioning, enrollment, role assignment, and archival
  according to the university semester cycle (Wintersemester/Sommersemester).

  Semester-Lebenszyklus-Management für openDesk Edu.
  Automatisiert die Kursbereitstellung, Einschreibung, Rollenzuweisung und
  Archivierung nach dem Universitätssemester-Zyklus.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - semester
  - lifecycle
  - course-provisioning
  - enrollment
  - archival
  - ilias
  - moodle
  - education
  - university
home: https://github.com/tobias-weiss-ai-xr/opendesk-edu
sources:
  - https://github.com/tobias-weiss-ai-xr/opendesk-edu
mainters:
  - name: openDesk Edu Contributors
annotations:
  artifacthub.io/changes: |
    - Initial release of Semester Lifecycle Management Helm chart
    - Course provisioning API deployment
    - Role synchronization CronJob (every 15 minutes)
    - Semester transition CronJob (semester start)
    - Semester archival CronJob (semester end)
    - Archival cleanup CronJob (April 1st)
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/tobias-weiss-ai-xr/opendesk-edu
    - name: Documentation
      url: https://github.com/tobias-weiss-ai-xr/opendesk-edu/tree/main/docs
