suite: NetworkPolicy
templates:
  - networkpolicy.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should not create a NetworkPolicy when disabled
    set:
      networkPolicy.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a NetworkPolicy when enabled
    asserts:
      - isKind:
          of: NetworkPolicy
      - isNotNull:
          path: metadata.name
      - matchRegex:
          path: metadata.name
          pattern: -network-policy$

  - it: should enforce both Ingress and Egress policy types
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: should allow DNS egress
    asserts:
      - isNotNull:
          path: spec.egress[0].to[0].ipBlock.cidr
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 0.0.0.0/0
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: TCP
            port: 53
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53

  - it: should allow intra-namespace egress
    asserts:
      - isNotNull:
          path: spec.egress[1].to[0].podSelector.matchLabels["app.kubernetes.io/instance"]

  - it: should allow egress to MariaDB on port 3306
    asserts:
      - isNotNull:
          path: spec.egress[2].to[0].podSelector.matchLabels["app.kubernetes.io/name"]
      - equal:
          path: spec.egress[2].to[0].podSelector.matchLabels["app.kubernetes.io/name"]
          value: mariadb
      - contains:
          path: spec.egress[2].ports
          content:
            protocol: TCP
            port: 3306

  - it: should allow egress to Redis on port 6379
    asserts:
      - isNotNull:
          path: spec.egress[3].to[0].podSelector.matchLabels["app.kubernetes.io/name"]
      - equal:
          path: spec.egress[3].to[0].podSelector.matchLabels["app.kubernetes.io/name"]
          value: redis
      - contains:
          path: spec.egress[3].ports
          content:
            protocol: TCP
            port: 6379

  - it: should allow egress to LDAP on port 389
    asserts:
      - isNotNull:
          path: spec.egress[4].to[0].podSelector.matchLabels["app.kubernetes.io/name"]
      - equal:
          path: spec.egress[4].to[0].podSelector.matchLabels["app.kubernetes.io/name"]
          value: openldap
      - contains:
          path: spec.egress[4].ports
          content:
            protocol: TCP
            port: 389

  - it: should allow ingress from same instance pods
    asserts:
      - isNotNull:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/instance"]

  - it: should allow ingress on correct ports
    asserts:
      - contains:
          path: spec.ingress[1].ports
          content:
            protocol: TCP
            port: 80

  - it: should select all pods in the release
    asserts:
      - isNotNull:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
