suite: test service
templates:
  - service.yaml
tests:
  - it: should create a ClusterIP service with correct ports
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: 8080
      - equal:
          path: spec.ports[1].name
          value: lmtp
      - equal:
          path: spec.ports[1].port
          value: 24
      - equal:
          path: spec.ports[2].name
          value: metrics
      - equal:
          path: spec.ports[2].port
          value: 9090
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: grommunio
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME
