suite: test service account
templates:
  - serviceaccount.yaml
tests:
  - it: should create a ServiceAccount when create is true
    set:
      grommunio.serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: grommunio
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: grommunio
  - it: should not create a ServiceAccount when create is false
    set:
      grommunio.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should use custom service account name
    set:
      grommunio.serviceAccount.create: true
      grommunio.serviceAccount.name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa
