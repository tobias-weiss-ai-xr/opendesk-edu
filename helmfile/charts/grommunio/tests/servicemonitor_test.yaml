suite: test service monitor
templates:
  - servicemonitor.yaml
tests:
  - it: should create a ServiceMonitor when monitoring is enabled
    set:
      grommunio.monitoring.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].port
          value: metrics
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: grommunio
      - contains:
          path: spec.namespaceSelector.matchNames
          content: NAMESPACE
  - it: should not create a ServiceMonitor when monitoring is disabled
    set:
      grommunio.monitoring.enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should use custom scrape interval and path
    set:
      grommunio.monitoring.enabled: true
      grommunio.monitoring.prometheus.path: /custom-metrics
      grommunio.monitoring.prometheus.scrapeInterval: 15s
    asserts:
      - equal:
          path: spec.endpoints[0].path
          value: /custom-metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 15s
