bigbluebutton:
  image: "ghcr.io/<your-org>/greenlight-saml"
  tag: "v1.3.0"
  replicaCount: 2
  volumes:
    recordings:
      name: bbb-recordings
      size: 500Gi
      accessMode: ReadWriteMany
      storageClass: ceph-cephfs-hdd-ec
  greenlight:
    databaseUrl: ""  # REQUIRED: Set to your PostgreSQL connection string, e.g. postgresql://greenlight:password@release-name-postgresql:5432/greenlight
    # secretKeyBase: ""  # Auto-generated by template (randAlphaNum 64) if not set
    defaultRegistration: "saml"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  service:
    externalPort: 80
    enabled: true
    annotations: {}

  ingress:
    enabled: true
    className: "haproxy"
    annotations:
      haproxy-ingress.github.io/ssl-redirect: "true"
      haproxy-ingress.github.io/timeout-server: "120000ms"
      haproxy-ingress.github.io/timeout-client: "120000ms"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      host: "bbb.opendesk.example.com"
      paths:
        path: "/"
        pathType: "ImplementationSpecific"
    tls:
      secretName: "opendesk-certificates-tls"

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
