{{- if or (not .Values.networkPolicy) .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-greenlight-network-policy
  labels:
    app: {{ .Release.Name }}-greenlight
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-greenlight
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-greenlight
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-greenlight
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app: {{ .Release.Name }}-greenlight
      ports:
        - protocol: TCP
          port: 80
{{- end }}
