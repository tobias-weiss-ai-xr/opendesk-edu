apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-greenlight
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-greenlight
spec:
  replicas: {{ .Values.bigbluebutton.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-greenlight
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-greenlight
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: greenlight
          image: "{{ .Values.bigbluebutton.image }}:{{ .Values.bigbluebutton.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seLinuxOptions: {}
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 80
          env:
            - name: DATABASE_URL
              value: {{ .Values.bigbluebutton.greenlight.databaseUrl | quote }}
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-greenlight-secrets
                  key: secret-key-base
            - name: RAILS_ENV
              value: "production"
            - name: RAILS_FORCE_SSL
              value: "false"
            - name: RAILS_LOG_TO_STDOUT
              value: "true"
            - name: RAILS_SERVE_STATIC_FILES
              value: "true"
            {{- if .Values.bigbluebutton.greenlight.bigbluebuttonEndpoint }}
            - name: BIGBLUEBUTTON_ENDPOINT
              value: {{ .Values.bigbluebutton.greenlight.bigbluebuttonEndpoint | quote }}
            {{- end }}
            {{- if .Values.bigbluebutton.greenlight.bigbluebuttonSecret }}
            - name: BIGBLUEBUTTON_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-greenlight-secrets
                  key: bbb-secret
            {{- end }}
            {{- if .Values.bigbluebutton.greenlight.defaultRegistration }}
            - name: DEFAULT_REGISTRATION
              value: {{ .Values.bigbluebutton.greenlight.defaultRegistration | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.bigbluebutton.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
