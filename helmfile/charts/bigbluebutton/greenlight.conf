<VirtualHost *:80>

    # Proxy to Greenlight Puma
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Shibboleth integration
    <Location /auth/shib>
        AuthType shibboleth
        ShibRequestSetting requireSession 1
        require valid-user
    </Location>

    # Shibboleth session info
    <Location /Shibboleth.sso>
        SetHandler shib
    </Location>

    # WebSocket support for ActionCable
    ProxyPass /cable ws://127.0.0.1:3000/cable
    ProxyPassReverse /cable ws://127.0.0.1:3000/cable

    ErrorLog ${APACHE_LOG_DIR}/greenlight-error.log
    CustomLog ${APACHE_LOG_DIR}/greenlight-access.log combined
</VirtualHost>
