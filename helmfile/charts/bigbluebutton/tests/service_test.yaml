suite: Service
templates:
  - service.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a Service
    asserts:
      - isKind:
          of: Service

  - it: should expose the configured external port
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 80

  - it: should target container port 80
    asserts:
      - equal:
          path: spec.ports[0].targetPort
          value: 80

  - it: should be of type ClusterIP
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should select greenlight pods
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app: RELEASE-NAME-greenlight
