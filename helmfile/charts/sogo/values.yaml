sogo:
  image:
    repository: sonroyaalmerol/docker-sogo
    tag: "5.11.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

  timezone: "Europe/Berlin"
  language: "English"
  pageTile: "openDesk Mail"

  # Database connection (PostgreSQL)
  db:
    host: "postgresql"
    port: 5432
    user: "sogo"
    password: ""
    name: "sogo"

  # LDAP connection
  ldap:
    host: "openldap"
    port: 389
    baseDN: "ou=users,dc=opendesk,dc=edu"
    bindDN: "uid=sogo,ou=services,dc=opendesk,dc=edu"
    bindPassword: ""

  # IMAP/SMTP servers
  imap:
    server: "imaps://dovecot:993"
  smtp:
    server: "smtp://postfix:587"
  sieve:
    server: "sieve://dovecot:4190"

  mailDomain: "opendesk.example.com"

  # OIDC/Keycloak SSO
  oidc:
    enabled: false
    configUrl: "https://keycloak.opendesk.example.com/realms/opendesk/.well-known/openid-configuration"
    clientId: "sogo"
    # clientSecret: ""  # Auto-generated by template (randAlphaNum 32) if not set
    scope: "openid profile email"

  # Memcached
  memcachedHost: "memcached:11211"

replicas: 1

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: sogo.opendesk.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  size: 1Gi
  accessMode: ReadWriteOnce
  storageClass: ""

service:
  type: ClusterIP
  port: 80
