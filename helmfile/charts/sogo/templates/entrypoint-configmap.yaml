apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sogo.fullname" . }}-entrypoint
  labels:
    {{- include "sogo.labels" . | nindent 4 }}
data:
  apache-wrapper.sh: |
    #!/bin/bash
    # Wrapper to disable chown for Apache socket files in containers
    # This prevents "Operation not permitted" errors when Apache tries
    # to change ownership of socket files in /var/run/apache2/

    # Override chown command to make it a no-op for Apache sockets
    chown() {
      # Check if the target is an Apache socket file
      for arg in "$@"; do
        case "$arg" in
          /var/run/apache2/socks*)
            # Silently skip chown for Apache socket files
            return 0
            ;;
        esac
      done

      # Call the real chown command for all other files
      command chown "$@"
    }
    export -f chown

    # Execute Apache with the patched environment
    exec /usr/sbin/apache2ctl "$@"

  supervisord.conf: |
    [unix_http_server]
    file=/var/run/supervisor.sock
    chmod=0700

    [supervisord]
    nodaemon=true
    logfile=/var/log/supervisord.log
    pidfile=/var/run/supervisord.pid
    childlogdir=/var/log/supervisor

    ; the below section must remain in the config file for RPC
    ; (supervisorctl/web interface) to work.
    [rpcinterface:supervisor]
    supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

    [supervisorctl]
    serverurl=unix:///var/run/supervisor.sock

    ; SOGo
    [program:sogo]
    user=root
    command=/usr/local/sbin/sogod -WOWorkersCount 5
    autostart=true
    autorestart=true
    stopasgroup=true
    killasgroup=true
    directory=/var/lib/sogo
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
    environment=HOME="/var/lib/sogo"

    ; Apache
    [program:apache]
    user=root
    command=/opt/custom-entrypoint/apache-wrapper.sh -D FOREGROUND
    autostart=true
    autorestart=true
    stopasgroup=true
    killasgroup=true
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
    environment=APACHE_RUN_USER="root",APACHE_RUN_GROUP="root",APACHE_PID_FILE="/var/run/apache2/apache2.pid",APACHE_RUN_DIR="/var/run/apache2"

    ; SOGo Config Generator (runs once at startup)
    [program:sogo_tool_plus]
    command=/usr/sbin/sogo-tool-plus update
    autostart=true
    autorestart=false
    startsecs=0
    exitcodes=0,1
    directory=/var/lib/sogo
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0

  entrypoint.sh: |
    #!/bin/bash
    # Custom SOGo entrypoint that bypasses privilege dropping for Kubernetes compatibility

    echo "Starting SOGo with custom entrypoint (K8s compatible)..."

    # create mandatory dirs (skip user/group creation)
    for dir in lib log run spool; do
      mkdir -p /var/$dir/sogo
      chmod 755 /var/$dir/sogo
    done

    # Make example scripts executable
    if [ -d "/usr/share/doc/sogo" ] && [ $(ls -al /usr/share/doc/sogo/ | grep .sh |  wc -l) -gt 0 ]; then
      chmod a+x /usr/share/doc/sogo/*.sh
    fi

    # Make Apache wrapper executable
    chmod +x /opt/custom-entrypoint/apache-wrapper.sh

    # Create custom yaml config folder
    mkdir -p "/etc/sogo/sogo.conf.d"

    if [ -z "$(ls -A /etc/sogo/sogo.conf.d)" ]; then
      echo "/etc/sogo/sogo.conf.d is empty. Falling back to using existing /etc/sogo/sogo.conf..."
    else
      echo "Generating sogo.conf from /etc/sogo/sogo.conf.d YAML files..."
      /opt/config-generator
    fi

    # Enforce mode on configuration (skip ownership changes)
    chmod 750 /etc/sogo
    chmod 640 /etc/sogo/sogo.conf
    chmod +x /usr/local/sbin/sogod

    # Start supervisor with custom configuration (bypass privilege dropping)
    echo "Starting SOGo services..."
    exec /usr/bin/supervisord -c /opt/custom-entrypoint/supervisord.conf