suite: Deployment
templates:
  - deployment.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a Deployment with correct kind
    asserts:
      - isKind:
          of: Deployment

  - it: should use the correct container image
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: sonroyaalmerol/docker-sogo:.+

  - it: should set the container port to 80
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 80

  - it: should have standard Kubernetes labels
    asserts:
      - isNotNull:
          path: metadata.labels
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/instance"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should set resource requests and limits
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits

  - it: should mount the data and config volumes
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: sogo-data
            mountPath: /var/lib/sogo
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: sogo-config
            mountPath: /etc/sogo/sogo.conf.d

  - it: should have readiness and liveness probes
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe

  - it: should reference configmap and secret via envFrom
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-sogo
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: RELEASE-NAME-sogo
