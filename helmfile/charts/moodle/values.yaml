moodle:
  replicaCount: 2
  image: "ghcr.io/<your-org>/moodle-shib"
  tag: "v1.4.0"
  moodleUsername: "admin"
  moodlePassword: ""
  moodleEmail: "admin@opendesk.example.com"
  moodleSiteName: "openDesk Moodle"
  moodleSkipInstall: false

  volumes:
    data:
      name: moodle-data
      size: 100Gi
      accessMode: ReadWriteMany
      storageClass: ceph-cephfs-hdd-ec

service:
  type: ClusterIP
  port: 80
  enabled: true
  annotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

ingress:
  enabled: false
  className: "haproxy"
  annotations: {}
  hosts:
    - host: "moodle.opendesk.example.com"
      paths:
        - path: /
          pathType: "ImplementationSpecific"
  tls:
    - secretName: "opendesk-certificates-tls"
      hosts:
        - "moodle.opendesk.example.com"

resources:
  requests:
    cpu: "500m"
    memory: "1G"
  limits:
    cpu: "2"
    memory: "2G"

securityContext:
  enabled: true
  fsGroup: 1001

containerSecurityContext:
  enabled: true

nodeSelector: {}
tolerations: []
affinity: {}

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  size: "8Gi"
  storageClass: ""
  accessMode: "ReadWriteMany"
