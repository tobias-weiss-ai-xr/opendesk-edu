suite: Deployment
templates:
  - deployment.yaml
tests:
  - it: should create a Deployment with correct kind
    asserts:
      - isKind:
          of: Deployment

  - it: should use the correct container image
    set:
      moodle.image: "ghcr.io/test-org/moodle-shib"
      moodle.tag: "v1.4.0"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: .+:.+

  - it: should set replica count from values
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should have standard Kubernetes labels
    asserts:
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/instance"]
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]

  - it: should configure Moodle environment variables
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MOODLE_USERNAME
            value: "admin"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MOODLE_EMAIL
            value: "admin@opendesk.example.com"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MOODLE_SITE_NAME
            value: "openDesk Moodle"

  - it: should set resource requests and limits
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits

  - it: should mount the data volume
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: moodle-data
            mountPath: /bitnami/moodle

  - it: should set pod security context with fsGroup from defaults
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1001

  - it: should render container security context when values are set
    set:
      containerSecurityContext.runAsNonRoot: true
      containerSecurityContext.runAsUser: 1001
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1001
