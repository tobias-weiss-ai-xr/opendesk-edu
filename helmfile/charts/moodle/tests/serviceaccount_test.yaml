suite: test serviceaccount
templates:
  - serviceaccount.yaml
tests:
  - it: should not create ServiceAccount when create is false (default)
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should create ServiceAccount when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-moodle
  - it: should set correct name when serviceAccount.name is specified
    set:
      serviceAccount.create: true
      serviceAccount.name: "custom-service-account"
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: custom-service-account
  - it: should include annotations when provided
    set:
      serviceAccount.create: true
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/moodle-role"
    asserts:
      - exists:
          path: metadata.annotations
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/moodle-role"
