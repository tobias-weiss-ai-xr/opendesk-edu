suite: test secret
templates:
  - secret.yaml
tests:
  - it: should create Secret with correct name
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-moodle-secrets
      - equal:
          path: type
          value: Opaque
  - it: should contain moodle-password in data
    asserts:
      - exists:
          path: data.moodle-password
  - it: should contain moodle-username in data
    asserts:
      - exists:
          path: data.moodle-username
  - it: should contain moodle-email in data
    asserts:
      - exists:
          path: data.moodle-email
  - it: should use custom password when provided
    set:
      moodle.moodlePassword: "custom-password"
    asserts:
      - exists:
          path: data.moodle-password
  - it: should use custom username when provided
    set:
      moodle.moodleUsername: "admin"
    asserts:
      - exists:
          path: data.moodle-username
  - it: should use custom email when provided
    set:
      moodle.moodleEmail: "admin@example.com"
    asserts:
      - exists:
          path: data.moodle-email
