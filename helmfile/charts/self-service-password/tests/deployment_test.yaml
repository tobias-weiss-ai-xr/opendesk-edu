suite: Deployment
templates:
  - deployment.yaml
tests:
  - it: should create a Deployment with correct kind
    asserts:
      - isKind:
          of: Deployment

  - it: should use the correct container image
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ltbproject/self-service-password:.+

  - it: should set the container port to the configured value
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 80

  - it: should have standard Kubernetes labels
    asserts:
      - isNotNull:
          path: metadata.labels
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/instance"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should set the self-service-password/server label
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            self-service-password/server: "true"

  - it: should have a single replica
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should configure LDAP environment variables
    set:
      selfServicePassword.ldap.host: "ldap.example.com"
      selfServicePassword.ldap.port: "636"
      selfServicePassword.ldap.baseDn: "dc=example,dc=com"
      selfServicePassword.ldap.bindDn: "cn=admin,dc=example,dc=com"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LDAP_HOST
            value: "ldap.example.com"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LDAP_PORT
            value: "636"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LDAP_BASE_DN
            value: "dc=example,dc=com"

  - it: should set container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 33
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 33
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
