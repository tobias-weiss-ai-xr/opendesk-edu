suite: SSO Check ConfigMap
templates:
  - sso-check-cronjob.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a ConfigMap with correct kind and name
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sso-check

  - it: should contain the sso-redirect-check.sh data key
    documentIndex: 0
    asserts:
      - isNotNull:
          path: data["sso-redirect-check.sh"]

  - it: should have standard Kubernetes labels
    documentIndex: 0
    asserts:
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/instance"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/managed-by"]

---
suite: SSO Check CronJob (disabled by default)
templates:
  - sso-check-cronjob.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a CronJob with correct kind and name
    documentIndex: 1
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sso-check

  - it: should be suspended when ssoCheck.enabled is not set
    documentIndex: 1
    asserts:
      - equal:
          path: spec.suspend
          value: true

  - it: should use default schedule
    documentIndex: 1
    asserts:
      - equal:
          path: spec.schedule
          value: "*/15 * * * *"

  - it: should set concurrencyPolicy to Forbid
    documentIndex: 1
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid

  - it: should use curlimages/curl image
    documentIndex: 1
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: curlimages/curl:latest

  - it: should set command to /bin/sh
    documentIndex: 1
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].command
          content: /bin/sh

  - it: should set container security context
    documentIndex: 1
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.privileged
          value: false
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsGroup
          value: 1000

---
suite: SSO Check CronJob (enabled)
templates:
  - sso-check-cronjob.yaml
values:
  - ../ci/ci-values.yaml
set:
  ssoCheck.enabled: true
tests:
  - it: should not be suspended when ssoCheck.enabled is true
    documentIndex: 1
    asserts:
      - equal:
          path: spec.suspend
          value: false

  - it: should use custom schedule when provided
    documentIndex: 1
    set:
      ssoCheck.schedule: "*/5 * * * *"
    asserts:
      - equal:
          path: spec.schedule
          value: "*/5 * * * *"

  - it: should mount the configmap as a volume
    documentIndex: 1
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.volumes[0].configMap.name
          value: RELEASE-NAME-sso-check
