suite: Secret
templates:
  - secret.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a Secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-f13-secrets
      - equal:
          path: type
          value: Opaque

  - it: should contain llm-api-key from CI values
    asserts:
      - isNotNull:
          path: stringData["llm-api-key"]
      - equal:
          path: stringData["llm-api-key"]
          value: ci-test-llm-key

  - it: should contain feedback-db-password from CI values
    asserts:
      - isNotNull:
          path: stringData["feedback-db-password"]
      - equal:
          path: stringData["feedback-db-password"]
          value: ci-test-feedback-db

  - it: should contain transcription-db-password from CI values
    asserts:
      - isNotNull:
          path: stringData["transcription-db-password"]
      - equal:
          path: stringData["transcription-db-password"]
          value: ci-test-transcription-db

  - it: should contain rabbitmq-password from CI values
    asserts:
      - isNotNull:
          path: stringData["rabbitmq-password"]
      - equal:
          path: stringData["rabbitmq-password"]
          value: ci-test-rabbitmq

  - it: should contain huggingface-token
    asserts:
      - isNotNull:
          path: stringData["huggingface-token"]

  - it: should have all required secret keys
    asserts:
      - isNotNull:
          path: stringData["llm-api-key"]
      - isNotNull:
          path: stringData["feedback-db-password"]
      - isNotNull:
          path: stringData["transcription-db-password"]
      - isNotNull:
          path: stringData["rabbitmq-password"]
      - isNotNull:
          path: stringData["huggingface-token"]
