suite: NetworkPolicy
templates:
  - networkpolicy.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should not create a NetworkPolicy when disabled
    set:
      networkPolicy.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a NetworkPolicy when enabled
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: RELEASE-NAME-f13-network-policy

  - it: should enforce both Ingress and Egress policy types
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: should allow DNS egress
    asserts:
      - isNotNull:
          path: spec.egress[0].to[0].ipBlock.cidr
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 0.0.0.0/0
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: TCP
            port: 53
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53

  - it: should allow intra-namespace egress
    asserts:
      - isNotNull:
          path: spec.egress[1].to[0].podSelector.matchLabels["app.kubernetes.io/instance"]

  - it: should allow ingress from same instance pods
    asserts:
      - isNotNull:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/instance"]

  - it: should allow ingress from ingress controller on frontend and core ports
    asserts:
      - contains:
          path: spec.ingress[1].ports
          content:
            protocol: TCP
            port: 9999
      - contains:
          path: spec.ingress[1].ports
          content:
            protocol: TCP
            port: 8000

  - it: should select all pods in the release
    asserts:
      - isNotNull:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
