suite: PodDisruptionBudget
templates:
  - pdb.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create 2 PDBs
    asserts:
      - hasDocuments:
          count: 2

  - it: should create core PDB with correct name and minAvailable
    documentIndex: 0
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: RELEASE-NAME-f13-core-pdb
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/component: core
      - equal:
          path: spec.minAvailable
          value: 1
      - isSubset:
          path: spec.selector.matchLabels
          content:
            app.kubernetes.io/component: core
            app.kubernetes.io/instance: RELEASE-NAME

  - it: should create frontend PDB with correct name and minAvailable
    documentIndex: 1
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: RELEASE-NAME-f13-frontend-pdb
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/component: frontend
      - equal:
          path: spec.minAvailable
          value: 1
      - isSubset:
          path: spec.selector.matchLabels
          content:
            app.kubernetes.io/component: frontend
            app.kubernetes.io/instance: RELEASE-NAME
