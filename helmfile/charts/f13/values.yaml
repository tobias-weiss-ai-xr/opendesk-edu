global:
  imageRegistry: registry.opencode.de/f13/microservices
  imagePullPolicy: IfNotPresent
  keycloakUrl: ""
  keycloakRealm: opendesk
  ingressClassName: haproxy

imagePullSecrets: []
  # - name: opencode-registry-secret

services:
  chat:
    enabled: true
  summary:
    enabled: true
  parser:
    enabled: true
  rag:
    enabled: true
  transcription:
    enabled: false

authentication:
  guestMode: false
  keycloakBaseUrl: ""
  keycloakRealm: ""
  audience: f13-api

llm:
  provider: openai
  apiUrl: ""
  authSecretRef: llm-api
  models:
    chat: ""
    summary: ""
    parser: ""

elasticsearch:
  deploy: true
  existingHost: ""
  memory: 2Gi
  replicas: 1

transcription:
  rabbitmq:
    image: rabbitmq:3.13-management
  transcriptionDb:
    image: postgres:16-alpine
    user: f13_transcription
    name: f13_transcription

gpu:
  nodeSelector: {}
  tolerations: []
  resources:
    limits: {}

rag:
  embeddingModel: ""

secrets:
  # llmApi: ""  # Auto-generated by template (randAlphaNum 32) if not set
  feedbackDb: ""
  transcriptionDb: ""
  rabbitmq: ""
  huggingfaceToken: ""  # REQUIRED: Set to your HuggingFace API token for model downloads

ingress:
  enabled: true
  hostname: f13.opendesk.example.com
  className: ""
  annotations: {}
  tls:
    enabled: true
    secretName: opendesk-certificates-tls

persistence:
  feedbackDb:
    size: 5Gi
    accessMode: ReadWriteOnce
  doclingModels:
    size: 10Gi
    accessMode: ReadWriteOnce
  transcriptionData:
    size: 10Gi
    accessMode: ReadWriteOnce
  transcriptionModels:
    size: 5Gi
    accessMode: ReadWriteOnce
  elasticsearchData:
    size: 10Gi
    accessMode: ReadWriteOnce

images:
  frontend:
    repository: frontend/main
    tag: latest
    pullPolicy: IfNotPresent
  core:
    repository: core/main
    tag: latest
    pullPolicy: IfNotPresent
  chat:
    repository: chat
    tag: v1.1.0
    pullPolicy: IfNotPresent
  summary:
    repository: summary/main
    tag: latest
    pullPolicy: IfNotPresent
  parser:
    repository: parser
    tag: v1.1.0
    pullPolicy: IfNotPresent
  rag:
    repository: rag
    tag: v1.1.0
    pullPolicy: IfNotPresent
  transcription:
    repository: transcription/transcription/main
    tag: latest
    pullPolicy: IfNotPresent
  transcriptionInference:
    repository: transcription/inference/main
    tag: latest
    pullPolicy: IfNotPresent

resources:
  core:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  frontend:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  chat:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  summary:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  parser:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  rag:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  transcription:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  transcriptionInference:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 16Gi
  rabbitmq:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  feedbackDb:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  transcriptionDb:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  elasticsearch:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

nodeSelector: {}

tolerations: []

affinity: {}

networkPolicy:
  enabled: true

pdb:
  core:
    minAvailable: 1
  frontend:
    minAvailable: 1
