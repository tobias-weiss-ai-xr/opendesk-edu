suite: Deployment
templates:
  - deployment.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a Deployment with correct kind
    asserts:
      - isKind:
          of: Deployment

  - it: should use the correct container image
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: etherpad/etherpad:.+

  - it: should set the container port to the configured value
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9001

  - it: should have standard Kubernetes labels
    asserts:
      - isNotNull:
          path: metadata.labels
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/instance"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should configure database environment variables
    set:
      etherpad.db.host: "test-db-host"
      etherpad.db.port: 5432
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_HOST
            value: "test-db-host"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_TYPE
            value: "postgres"

  - it: should set resource requests and limits
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits

  - it: should mount the data and config volumes
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: etherpad-data
            mountPath: /opt/etherpad/var

  - it: should set container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 0
