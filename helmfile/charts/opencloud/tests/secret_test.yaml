suite: Secret
templates:
  - secret.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a Secret with correct kind
    asserts:
      - isKind:
          of: Secret

  - it: should have standard Kubernetes labels
    asserts:
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/instance"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should auto-generate oc-jwt-secret
    asserts:
      - isNotNull:
          path: stringData["oc-jwt-secret"]

  - it: should auto-generate oc-transfer-secret
    asserts:
      - isNotNull:
          path: stringData["oc-transfer-secret"]

  - it: should auto-generate oc-machine-auth-api-key
    asserts:
      - isNotNull:
          path: stringData["oc-machine-auth-api-key"]

  - it: should auto-generate oc-system-user-api-key
    asserts:
      - isNotNull:
          path: stringData["oc-system-user-api-key"]

  - it: should auto-generate oc-url-signing-secret
    asserts:
      - isNotNull:
          path: stringData["oc-url-signing-secret"]

  - it: should auto-generate oc-oidc-client-secret
    asserts:
      - isNotNull:
          path: stringData["oc-oidc-client-secret"]
