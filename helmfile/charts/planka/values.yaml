planka:
  image: ghcr.io/plankanban/planka
  tag: latest
  port: 1337

  # Default admin user credentials (overridden by secretRef when set)
  defaultEmail: ""
  # defaultPassword: ""  # Auto-generated by template (randAlphaNum 32) if not set

  # Base URL for Planka
  baseUrl: ""

  # Secret key for encryption (overridden by secretRef when set)
  # secretKey: ""  # Auto-generated by template (randAlphaNum 64) if not set

  # OIDC configuration for Keycloak integration
  oidc:
    clientId: ""
    # clientSecret: ""  # Auto-generated by template (randAlphaNum 32) if not set
    authEndpoint: ""
    tokenEndpoint: ""
    userinfoEndpoint: ""
    scope: "openid profile email"

  # Volume configuration
  volumes:
    data:
      size: 1Gi
      accessMode: ReadWriteMany
      # storageClass: ""

  # Resource configuration
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

extraVolumes: []
extraVolumeMounts: []

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: "nginx"
  hosts:
    - host: planka.opendesk.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: planka-tls
      hosts:
        - planka.opendesk.example.com

postgresql:
  enabled: true
  auth:
    username: planka
    password: ""
    database: planka
  primary:
    persistence:
      enabled: true
      size: 8Gi
