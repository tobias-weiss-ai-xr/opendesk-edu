name: Dependency Update Check

on:
  schedule:
    # Run every Monday at 6:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  check-updates:
    name: Check for upstream updates
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.19.0"

      - name: Check upstream openDesk version
        run: |
          echo "### Upstream Version Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CURRENT=$(grep "softwareVersion:" publiccode.yml | sed 's/.*: "//;s/".*//' | sed 's/-edu.*//')
          echo "**Current fork version:** ${CURRENT}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the upstream releases at:" >> $GITHUB_STEP_SUMMARY
          echo "- https://github.com/Bundesdruckerei/opendesk/releases" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Manual action required: Review upstream changes and merge if compatible." >> $GITHUB_STEP_SUMMARY

      - name: Check Helm chart versions
        run: |
          echo "### Edu Chart Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Chart | Configured Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------------|" >> $GITHUB_STEP_SUMMARY

          # ILIAS
          if grep -q "tag:" helmfile/apps/ilias/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/ilias/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| ILIAS | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # Moodle
          if grep -q "tag:" helmfile/apps/moodle/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/moodle/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Moodle | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # BigBlueButton
          if grep -q "tag:" helmfile/apps/bigbluebutton/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/bigbluebutton/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| BigBlueButton | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # OpenCloud
          if grep -q "tag:" helmfile/apps/opencloud/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/opencloud/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| OpenCloud | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # Etherpad
          if grep -q "tag:" helmfile/apps/etherpad/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/etherpad/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Etherpad | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # BookStack
          if grep -q "tag:" helmfile/apps/bookstack/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/bookstack/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| BookStack | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # Planka
          if grep -q "tag:" helmfile/apps/planka/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/planka/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Planka | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # Zammad
          if grep -q "tag:" helmfile/apps/zammad/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/zammad/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Zammad | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # LimeSurvey
          if grep -q "tag:" helmfile/apps/limesurvey/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/limesurvey/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| LimeSurvey | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # Draw.io
          if grep -q "tag:" helmfile/apps/drawio/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/drawio/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Draw.io | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # Excalidraw
          if grep -q "tag:" helmfile/apps/excalidraw/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/excalidraw/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Excalidraw | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # Self-Service Password
          if grep -q "tag:" helmfile/apps/self-service-password/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/self-service-password/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Self-Service Password | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # SOGo
          if grep -q "tag:" helmfile/apps/sogo/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/sogo/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| SOGo | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # F13
          if grep -q "tag:" helmfile/apps/snipr/values.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/snipr/values.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Snipr | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          # Grommunio
          if grep -q "tag:" helmfile/apps/grommunio/values-grommunio.yaml.gotmpl 2>/dev/null; then
            TAG=$(grep "tag:" helmfile/apps/grommunio/values-grommunio.yaml.gotmpl | head -1 | awk '{print $2}' | tr -d '"')
            echo "| Grommunio | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check latest releases:" >> $GITHUB_STEP_SUMMARY
          echo "- ILIAS: https://github.com/ILIAS-eLearning/ILIAS/releases" >> $GITHUB_STEP_SUMMARY
          echo "- Moodle: https://moodle.org/release/" >> $GITHUB_STEP_SUMMARY
          echo "- BBB: https://github.com/bigbluebutton/bigbluebutton/releases" >> $GITHUB_STEP_SUMMARY
          echo "- OpenCloud: https://github.com/opencloudeu/opencloud/releases" >> $GITHUB_STEP_SUMMARY
          echo "- Etherpad: https://github.com/ether/etherpad-lite/releases" >> $GITHUB_STEP_SUMMARY
          echo "- BookStack: https://github.com/BookStackApp/BookStack/releases" >> $GITHUB_STEP_SUMMARY
          echo "- Planka: https://github.com/plankanban/planka/releases" >> $GITHUB_STEP_SUMMARY
          echo "- Zammad: https://github.com/zammad/zammad/releases" >> $GITHUB_STEP_SUMMARY
          echo "- LimeSurvey: https://github.com/LimeSurvey/LimeSurvey/releases" >> $GITHUB_STEP_SUMMARY
          echo "- Draw.io: https://github.com/jgraph/drawio/releases" >> $GITHUB_STEP_SUMMARY
          echo "- Excalidraw: https://github.com/excalidraw/excalidraw/releases" >> $GITHUB_STEP_SUMMARY
          echo "- Self-Service Password: https://github.com/ltb-project/self-service-password/releases" >> $GITHUB_STEP_SUMMARY
          echo "- SOGo: https://github.com/inverse-inc/sogo/releases" >> $GITHUB_STEP_SUMMARY
