name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan-python:
    name: Python Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan Python dependencies
        run: |
          pip-audit scripts/user_import/requirements.txt \
            --format json \
            --output pip-audit-report.json || true

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('pip-audit-report.json')) {
              const report = JSON.parse(fs.readFileSync('pip-audit-report.json', 'utf8'));
              if (report.dependencies && report.dependencies.length > 0) {
                const vulnerabilities = report.dependencies.filter(d => d.vulns && d.vulns.length > 0);
                if (vulnerabilities.length > 0) {
                  const message = `⚠️ Security vulnerabilities found in Python dependencies:\n\n` +
                    vulnerabilities.map(v => `• ${v.name}: ${v.vulns.length} vulnerabilities`).join('\n');
                  github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: message
                  });
                }
              }
            }

  sast-python:
    name: Python SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Semgrep
        uses: returntocorp/semgrep-action@v1

      - name: Run Semgrep on Python scripts
        run: |
          semgrep --config=auto \
            --json \
            --output=semgrep-report.json \
            scripts/user_import/

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  helm-security:
    name: Helm Chart Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.17.0'

      - name: Run Trivy on Helm charts
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'helmfile/charts/'
          format: 'sarif'
          output: 'trivy-helm-report.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-helm-report.sarif'
          category: 'helm-chart-security'

  kubernetes-security:
    name: Kubernetes Manifest Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Checkov
        run: pip install checkov

      - name: Run Checkov on Kubernetes manifests
        run: |
          checkov -d helmfile/charts/ \
            -f .github/ \
            --framework kubernetes \
            --output json \
            --output-file checkov-report.json \
            --soft-fail \
            --skip-check CKV_K8S_20  # Skip readiness probe check

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: checkov-report.json

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          format: json
          verbose: true

      - name: Upload Gitleaks results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM for Helm charts
        run: |
          syft helmfile/charts/ \
            -o spdx-json \
            --file sbom-helm.json

      - name: Generate SBOM for Python scripts
        run: |
          syft dir:scripts/user_import/ \
            -o spdx-json \
            --file sbom-python.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-helm.json
            sbom-python.json

      - name: Upload SBOM to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: github-sbom
          path: sbom-*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan-python, sast-python, helm-security, kubernetes-security, secret-scan]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-scan-results

      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" > summary.md
          echo "" >> summary.md
          echo "## Scans Performed" >> summary.md
          echo "- Python Dependency Scan" >> summary.md
          echo "- Python SAST" >> summary.md
          echo "- Helm Chart Security" >> summary.md
          echo "- Kubernetes Security" >> summary.md
          echo "- Secret Scanning" >> summary.md
          echo "" >> summary.md
          echo "## Results" >> summary.md
          echo "Full scan results available as artifacts." >> summary.md

      - name: Post summary to GitHub
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');
            core.setOutput('summary', summary);

  fail-on-critical:
    name: Fail on Critical Vulnerabilities
    runs-on: ubuntu-latest
    needs: [dependency-scan-python, helm-security]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download scan results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-report.*'
          path: scan-results

      - name: Check for critical vulnerabilities
        run: |
          # Check pip-audit for critical vulnerabilities
          if [ -f scan-results/pip-audit-report/pip-audit-report.json ]; then
            critical_count=$(jq '[.dependencies[] | select(.vulns[]?.severity == "CRITICAL")] | length' \
              scan-results/pip-audit-report/pip-audit-report.json || echo 0)
            if [ "$critical_count" -gt 0 ]; then
              echo "CRITICAL: $critical_count critical vulnerabilities found in Python dependencies"
              exit 1
            fi
          fi

          # Check Trivy for critical vulnerabilities
          if [ -f scan-results/trivy-helm-report/trivy-helm-report.sarif ]; then
            critical_count=$(jq '[.runs[0].results[] | select(.ruleId | startswith("CRITICAL"))] | length' \
              scan-results/trivy-helm-report/trivy-helm-report.sarif || echo 0)
            if [ "$critical_count" -gt 0 ]; then
              echo "CRITICAL: $critical_count critical vulnerabilities found in Helm charts"
              exit 1
            fi
          fi
