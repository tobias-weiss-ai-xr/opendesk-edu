name: Mirror from Codeberg

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror from Codeberg
        uses: actions/checkout@v4
        with:
          repository: opendesk-edu/deployment
          url: https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/opendesk-edu/deployment.git
          fetch-depth: 0
          path: opendesk-edu

      - name: Push to GitHub
        run: |
          cd opendesk-edu
          git config user.name "Mirror Bot"
          git config user.email "mirror@opendesk-edu.org"
          git push --mirror https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/tobias-weiss-ai-xr/opendesk-edu.git