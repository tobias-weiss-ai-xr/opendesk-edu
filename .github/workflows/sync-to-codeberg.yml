name: Mirror from Codeberg

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror from Codeberg
        uses: actions/checkout@v4
        with:
          repository: opendesk-edu/deployment
          url: https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/opendesk-edu/deployment.git
          fetch-depth: 0
          path: opendesk-edu

      - name: Push to GitHub
        env:
          GH_TOKEN: ${{ secrets.MIRROR_PAT }}
        run: |
          cd opendesk-edu
          git config user.name "Mirror Bot"
          git config user.email "mirror@opendesk-edu.org"
          git remote add github "https://x-access-token:${GH_TOKEN}@github.com/tobias-weiss-ai-xr/opendesk-edu.git"
          # GitHub Actions cannot push workflow file changes from within a workflow run.
          # Remove workflow files from the index before pushing to avoid the restriction.
          git rm -r --cached .github/workflows/ 2>/dev/null || true
          git commit -m "mirror: sync from Codeberg (workflow files excluded)" --allow-empty 2>/dev/null || true
          git push github main --force
