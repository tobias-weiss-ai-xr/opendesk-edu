name: Deploy Docs Preview

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/deploy-docs-preview.yml'

permissions:
  contents: read
  deployments: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install markdown-to-html dependencies
        run: |
          npm install -g markdown-it-cli
          npm install markdown-it-footnote markdown-it-mark

      - name: Build docs
        run: |
          mkdir -p docs-preview
          for md in $(find docs -name '*.md'); do
            html="docs-preview/${md%.md}.html"
            mkdir -p "$(dirname "$html")"
            markdown-it "$md" -o "$html"
          done
          # Build README
          markdown-it README.md -o docs-preview/index.html

      - name: Deploy to Cloudflare Pages (or similar)
        run: |
          echo "Docs preview built successfully"
          echo "Would deploy to: https://preview-${{ github.event.number }}.yourdomain.com"
        # Replace with actual deploy provider (Cloudflare Pages, Netlify, Vercel, etc)
