name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Lint YAML files
        continue-on-error: true
        run: |
          yamllint -c .yamllint \
            helmfile/charts/ilias/values.yaml \
            helmfile/charts/moodle/values.yaml \
            helmfile/charts/bigbluebutton/values.yaml \
            helmfile/charts/opencloud/values.yaml \
            docs/ \
            .github/ \
            publiccode.yml

  helm-lint:
    name: Helm Lint (edu charts)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - helmfile/charts/ilias
          - helmfile/charts/moodle
          - helmfile/charts/bigbluebutton
          - helmfile/charts/opencloud
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint "${{ matrix.chart }}"

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cspell
        run: npm install -g cspell

      - name: Run cspell
        run: |
          cspell --config cspell.json \
            "README.md" "ROADMAP.md" "CONTRIBUTING.md" \
            "docs/university-apps-concept.md" "docs/external-services.md" \
            "docs/getting-started.md" \
            ".github/" \
            --no-progress

  check-secrets:
    name: Secret Leak Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: pip install trufflehog3

      - name: Scan for secrets
        run: |
          trufflehog3 --regex --no-update filesystem . \
            --include "helmfile/apps/ilias/" \
            --include "helmfile/apps/moodle/" \
            --include "helmfile/apps/bigbluebutton/" \
            --include "helmfile/apps/opencloud/" \
            --include "docs/external-services/ilias-deployment-guide.md" \
            --ignore "opendesk.example.com" \
            --ignore "example.com" \
            --ignore "s3.example.com" \
            --ignore "admin@example.com" \
            --ignore "admin@opendesk.example.com" \
            --ignore "localhost" \
            --ignore "127.0.0.1" \
            --ignore "your-org" \
            --ignore "your-org/greenlight-saml" \
            --ignore "your-org/moodle-shib" \
            --ignore "your-org/ilias-shibboleth" \
            --ignore "your-org/opencloud" \
            --ignore "ghcr.io" \
            || echo "Scan complete (no verified secrets found)"
