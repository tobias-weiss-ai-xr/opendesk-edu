name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-charts:
    name: Chart Lint (ct)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_charts=${changed}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      - name: Install helm-unittest plugin
        if: steps.list-changed.outputs.changed == 'true'
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v0.7.2

      - name: Run helm-unittest
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          for chart in ${{ steps.list-changed.outputs.changed_charts }}; do
            echo "Testing ${chart}..."
            helm unittest "${chart}"
          done

  template-render:
    name: Template Rendering
    runs-on: ubuntu-latest
    needs: lint-charts
    strategy:
      matrix:
        chart:
          - helmfile/charts/ilias
          - helmfile/charts/moodle
          - helmfile/charts/bigbluebutton
          - helmfile/charts/opencloud
          - helmfile/charts/etherpad
          - helmfile/charts/bookstack
          - helmfile/charts/planka
          - helmfile/charts/zammad
          - helmfile/charts/limesurvey
          - helmfile/charts/drawio
          - helmfile/charts/excalidraw
          - helmfile/charts/self-service-password
          - helmfile/charts/sogo
        helm-version:
          - "v3.17.0"
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "${{ matrix.helm-version }}"

      - name: Helm template (default values)
        run: helm template test "${{ matrix.chart }}" > /dev/null

      - name: Helm template (CI values)
        run: |
          if ls "${{ matrix.chart }}/ci/"*-values.yaml 1>/dev/null 2>&1; then
            for values_file in "${{ matrix.chart }}/ci/"*-values.yaml; do
              echo "Rendering with ${values_file}..."
              helm template test "${{ matrix.chart }}" -f "${values_file}" > /tmp/rendered.yaml
            done
          else
            echo "No CI values file — rendering with defaults"
            helm template test "${{ matrix.chart }}" > /tmp/rendered.yaml
          fi

      - name: Install kubeconform
        run: |
          wget -qO- https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz | tar xz -C /usr/local/bin kubeconform

      - name: Validate with kubeconform
        run: kubeconform -summary -ignore-missing-schemas -kubernetes-version 1.29.0 /tmp/rendered.yaml

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint \
            helmfile/charts/ \
            docs/ \
            .github/ \
            publiccode.yml

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cspell
        run: npm install -g cspell

      - name: Run cspell
        run: |
          cspell --config cspell.json \
            "README.md" "ROADMAP.md" "CONTRIBUTING.md" \
            "docs/university-apps-concept.md" "docs/external-services.md" \
            "docs/getting-started.md" \
            ".github/" \
            --no-progress

  helm-unittest:
    name: Helm Unittest (all charts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v0.7.2

      - name: Run helm-unittest on all charts
        run: |
          for chart in helmfile/charts/*/; do
            echo "Testing ${chart}..."
            helm unittest "${chart}"
          done

  check-secrets:
    name: Secret Leak Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for secrets
        run: |
          trufflehog filesystem \
            helmfile/apps/ilias/ \
            helmfile/apps/moodle/ \
            helmfile/apps/bigbluebutton/ \
            helmfile/apps/opencloud/ \
            helmfile/apps/etherpad/ \
            helmfile/apps/bookstack/ \
            helmfile/apps/planka/ \
            helmfile/apps/zammad/ \
            helmfile/apps/limesurvey/ \
            helmfile/apps/drawio/ \
            helmfile/apps/excalidraw/ \
            helmfile/apps/self-service-password/ \
            helmfile/apps/sogo/ \
            docs/external-services/ilias-deployment-guide.md
