name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.1'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          cd scripts/semester-provisioning
          pip install pytest httpx

      - name: Run Python tests
        run: |
          cd scripts/semester-provisioning
          python -m pytest tests/ -v

      - name: Install yamllint
        run: pip install yamllint

      - name: Install helmfile
        run: |
          wget -O- -q https://github.com/helmfile/helmfile/releases/download/v0.168.0/helmfile_0.168.0_linux_amd64.tar.gz | tar xzf -
          sudo mv helmfile /usr/local/bin/

      - name: Run helm lint
        run: make lint

      - name: Run helm template validation
        run: make template

      - name: Run yamllint
        run: make yamllint

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cspell
        run: npm install -g cspell

      - name: Run spellcheck
        run: make spellcheck
