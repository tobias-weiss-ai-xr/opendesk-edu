<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>

    <!-- Primary purple glow -->
    <filter id="glowPrimary" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft purple glow -->
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Wide ambient glow -->
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>

    <!-- Subtle text glow -->
    <filter id="glowText" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- D-icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>

    <!-- Edge accent gradient left -->
    <linearGradient id="edgeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>

    <!-- Edge accent gradient right -->
    <linearGradient id="edgeRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.08"/>
    </pattern>

    <!-- Dot grid pattern -->
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.15"/>
    </pattern>

    <!-- Connector line pattern -->
    <pattern id="connectors" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="2" fill="#571EFA" opacity="0.12"/>
      <circle cx="80" cy="0" r="2" fill="#571EFA" opacity="0.12"/>
      <circle cx="80" cy="80" r="2" fill="#571EFA" opacity="0.12"/>
      <circle cx="0" cy="80" r="2" fill="#571EFA" opacity="0.12"/>
      <line x1="0" y1="0" x2="80" y2="0" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
      <line x1="80" y1="0" x2="80" y2="80" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>

    <!-- Book/page gradient -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#341291" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Graduation cap gradient -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#dotGrid)"/>

  <!-- Connector network pattern (education network) -->
  <rect x="800" y="0" width="480" height="640" fill="url(#connectors)" opacity="0.5"/>

  <!-- ==================== EDGE ACCENTS ==================== -->
  <!-- Left edge purple accent -->
  <rect x="0" y="0" width="200" height="640" fill="url(#edgeLeft)"/>
  <!-- Right edge lavender accent -->
  <rect x="1080" y="0" width="200" height="640" fill="url(#edgeRight)"/>
  <!-- Top purple line -->
  <rect x="0" y="0" width="1280" height="2" fill="#571EFA" opacity="0.4"/>
  <!-- Bottom subtle line -->
  <rect x="0" y="638" width="1280" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- ==================== AMBIENT GLOW BLOBS ==================== -->
  <ellipse cx="180" cy="320" rx="200" ry="200" fill="#571EFA" opacity="0.08" filter="url(#glowWide)"/>
  <ellipse cx="1100" cy="300" rx="180" ry="180" fill="#927AFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="640" cy="100" rx="300" ry="100" fill="#571EFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- ==================== FLOATING GEOMETRIC SHAPES ==================== -->
  <!-- Hexagons (education/science feel) -->
  <polygon points="920,80 945,65 970,80 970,110 945,125 920,110" fill="none" stroke="#927AFA" stroke-width="1" opacity="0.15"/>
  <polygon points="1050,500 1075,485 1100,500 1100,530 1075,545 1050,530" fill="none" stroke="#571EFA" stroke-width="1" opacity="0.12"/>
  <polygon points="1150,150 1175,135 1200,150 1200,180 1175,195 1150,180" fill="#571EFA" opacity="0.06"/>

  <!-- Circles (nodes / connection points) -->
  <circle cx="950" cy="200" r="4" fill="#927AFA" opacity="0.3"/>
  <circle cx="1020" cy="160" r="3" fill="#571EFA" opacity="0.25"/>
  <circle cx="1080" cy="240" r="5" fill="#927AFA" opacity="0.2"/>
  <circle cx="1150" cy="350" r="3" fill="#DDD6FE" opacity="0.15"/>
  <circle cx="1200" cy="420" r="4" fill="#571EFA" opacity="0.2"/>
  <circle cx="1000" cy="480" r="3" fill="#927AFA" opacity="0.25"/>
  <circle cx="880" cy="520" r="4" fill="#571EFA" opacity="0.18"/>
  <circle cx="1100" cy="100" r="3" fill="#DDD6FE" opacity="0.12"/>

  <!-- Connection lines between nodes (learning network) -->
  <line x1="950" y1="200" x2="1020" y2="160" stroke="#927AFA" stroke-width="0.8" opacity="0.12"/>
  <line x1="1020" y1="160" x2="1080" y2="240" stroke="#571EFA" stroke-width="0.8" opacity="0.1"/>
  <line x1="1080" y1="240" x2="1150" y2="350" stroke="#927AFA" stroke-width="0.8" opacity="0.08"/>
  <line x1="1150" y1="350" x2="1200" y2="420" stroke="#571EFA" stroke-width="0.8" opacity="0.1"/>
  <line x1="1000" y1="480" x2="1080" y2="240" stroke="#927AFA" stroke-width="0.5" opacity="0.06" stroke-dasharray="4,4"/>
  <line x1="880" y1="520" x2="1000" y2="480" stroke="#571EFA" stroke-width="0.8" opacity="0.08"/>
  <line x1="1100" y1="100" x2="1150" y2="180" stroke="#DDD6FE" stroke-width="0.5" opacity="0.1"/>

  <!-- Small floating diamonds -->
  <rect x="130" y="120" width="8" height="8" rx="1" fill="#927AFA" opacity="0.15" transform="rotate(45,134,124)"/>
  <rect x="80" y="500" width="6" height="6" rx="1" fill="#571EFA" opacity="0.12" transform="rotate(45,83,503)"/>
  <rect x="750" y="100" width="7" height="7" rx="1" fill="#DDD6FE" opacity="0.1" transform="rotate(45,753.5,103.5)"/>
  <rect x="700" y="540" width="5" height="5" rx="1" fill="#927AFA" opacity="0.1" transform="rotate(45,702.5,542.5)"/>

  <!-- ==================== EDUCATION DECORATIVE ELEMENTS ==================== -->

  <!-- Graduation Cap (top right area) -->
  <g transform="translate(980, 60) scale(0.9)" opacity="0.18">
    <!-- Cap board (diamond shape) -->
    <polygon points="60,10 120,35 60,60 0,35" fill="url(#capGrad)" stroke="#927AFA" stroke-width="1"/>
    <!-- Cap top -->
    <polygon points="60,5 125,32 60,58 -5,32" fill="none" stroke="#927AFA" stroke-width="0.8" opacity="0.5"/>
    <!-- Tassel line -->
    <line x1="60" y1="60" x2="60" y2="90" stroke="#927AFA" stroke-width="1.2"/>
    <!-- Tassel end -->
    <circle cx="60" cy="93" r="3" fill="#571EFA"/>
    <!-- Button on top -->
    <circle cx="60" cy="10" r="3" fill="#927AFA" opacity="0.6"/>
  </g>

  <!-- Book/Scroll (bottom left area) -->
  <g transform="translate(60, 460) scale(0.85)" opacity="0.14">
    <!-- Book body -->
    <rect x="0" y="10" width="80" height="100" rx="3" fill="url(#bookGrad)" stroke="#571EFA" stroke-width="1"/>
    <!-- Book spine -->
    <line x1="8" y1="10" x2="8" y2="110" stroke="#927AFA" stroke-width="1.5" opacity="0.5"/>
    <!-- Pages lines -->
    <line x1="18" y1="30" x2="70" y2="30" stroke="#927AFA" stroke-width="0.8" opacity="0.4"/>
    <line x1="18" y1="42" x2="65" y2="42" stroke="#927AFA" stroke-width="0.8" opacity="0.3"/>
    <line x1="18" y1="54" x2="68" y2="54" stroke="#927AFA" stroke-width="0.8" opacity="0.4"/>
    <line x1="18" y1="66" x2="60" y2="66" stroke="#927AFA" stroke-width="0.8" opacity="0.3"/>
    <line x1="18" y1="78" x2="66" y2="78" stroke="#927AFA" stroke-width="0.8" opacity="0.25"/>
    <!-- Book cover edge -->
    <rect x="0" y="10" width="80" height="100" rx="3" fill="none" stroke="#571EFA" stroke-width="1.5"/>
  </g>

  <!-- Second smaller book (stacked) -->
  <g transform="translate(75, 485) scale(0.6) rotate(-5)" opacity="0.1">
    <rect x="0" y="10" width="70" height="90" rx="3" fill="none" stroke="#927AFA" stroke-width="1"/>
    <line x1="6" y1="10" x2="6" y2="100" stroke="#927AFA" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Scroll/unrolled paper (right side) -->
  <g transform="translate(1060, 380) scale(0.7)" opacity="0.1">
    <rect x="0" y="15" width="60" height="80" rx="2" fill="none" stroke="#DDD6FE" stroke-width="1"/>
    <ellipse cx="30" cy="15" rx="30" ry="6" fill="none" stroke="#DDD6FE" stroke-width="1"/>
    <ellipse cx="30" cy="95" rx="30" ry="6" fill="none" stroke="#DDD6FE" stroke-width="1"/>
    <line x1="10" y1="35" x2="50" y2="35" stroke="#DDD6FE" stroke-width="0.6" opacity="0.4"/>
    <line x1="10" y1="47" x2="48" y2="47" stroke="#DDD6FE" stroke-width="0.6" opacity="0.3"/>
    <line x1="10" y1="59" x2="50" y2="59" stroke="#DDD6FE" stroke-width="0.6" opacity="0.4"/>
    <line x1="10" y1="71" x2="45" y2="71" stroke="#DDD6FE" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- Pencil (subtle, angled) -->
  <g transform="translate(720, 470) rotate(25) scale(0.8)" opacity="0.1">
    <rect x="0" y="0" width="8" height="70" fill="#927AFA"/>
    <polygon points="0,70 8,70 4,82" fill="#DDD6FE"/>
    <rect x="0" y="0" width="8" height="8" fill="#571EFA"/>
  </g>

  <!-- Atom/science symbol (subtle, top center-left) -->
  <g transform="translate(430, 120) scale(0.5)" opacity="0.08">
    <circle cx="40" cy="40" r="5" fill="#571EFA"/>
    <ellipse cx="40" cy="40" rx="35" ry="12" fill="none" stroke="#927AFA" stroke-width="1.2"/>
    <ellipse cx="40" cy="40" rx="35" ry="12" fill="none" stroke="#927AFA" stroke-width="1.2" transform="rotate(60,40,40)"/>
    <ellipse cx="40" cy="40" rx="35" ry="12" fill="none" stroke="#927AFA" stroke-width="1.2" transform="rotate(120,40,40)"/>
  </g>

  <!-- ==================== D-ICON (Brand Mark) ==================== -->
  <g transform="translate(130, 170)" filter="url(#glowPrimary)">
    <!-- Icon glow backdrop -->
    <rect x="-10" y="-10" width="310" height="310" rx="40" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>

    <!-- Rounded square background -->
    <rect x="0" y="0" width="290" height="290" rx="52" fill="url(#iconGrad)" opacity="0.95"/>

    <!-- Inner subtle border -->
    <rect x="4" y="4" width="282" height="282" rx="48" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>

    <!-- D letter -->
    <text x="145" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="200" font-weight="bold" fill="white" opacity="0.95">D</text>

    <!-- D letter subtle inner highlight -->
    <text x="143" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="200" font-weight="bold" fill="white" opacity="0.05">D</text>
  </g>

  <!-- ==================== TYPOGRAPHY ==================== -->

  <!-- "openDesk" wordmark -->
  <text x="500" y="310" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="bold" fill="white" letter-spacing="3" filter="url(#glowText)">openDesk</text>

  <!-- "EDUCATION" subtitle -->
  <text x="502" y="370" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="300" fill="#DDD6FE" letter-spacing="18">EDUCATION</text>

  <!-- Thin separator line between wordmark and subtitle -->
  <line x1="502" y1="325" x2="780" y2="325" stroke="#571EFA" stroke-width="1.5" opacity="0.4"/>

  <!-- Tagline -->
  <text x="502" y="415" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#927AFA" letter-spacing="2" opacity="0.7">LEARN  ·  COLLABORATE  ·  BUILD</text>

  <!-- ==================== ADDITIONAL DECORATIVE ACCENTS ==================== -->

  <!-- Horizontal accent lines -->
  <line x1="500" y1="260" x2="500" y2="440" stroke="#571EFA" stroke-width="1" opacity="0.15"/>
  <line x1="780" y1="260" x2="780" y2="440" stroke="#571EFA" stroke-width="1" opacity="0.1"/>

  <!-- Corner accent marks -->
  <path d="M 20,20 L 50,20 M 20,20 L 20,50" stroke="#571EFA" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 1260,20 L 1230,20 M 1260,20 L 1260,50" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 20,620 L 50,620 M 20,620 L 20,590" stroke="#571EFA" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 1260,620 L 1230,620 M 1260,620 L 1260,590" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>

  <!-- Subtle horizontal scan lines for depth -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#571EFA" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#571EFA" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#571EFA" stroke-width="0.3" opacity="0.05"/>

</svg>
