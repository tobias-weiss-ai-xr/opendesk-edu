<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="system-ui,-apple-system,sans-serif">
  <style>
    .g{font-size:10px;fill:#6B7280;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
    .n{font-size:11px;fill:#1F2937;text-anchor:middle;dominant-baseline:central;font-weight:500}
    .s{rx:6;stroke-width:1.5}
  </style>
  <rect width="900" height="300" fill="#FAFBFC"/>
  <text x="30" y="20" class="g">Component Alternatives</text>
  
  <!-- Groupware Section -->
  <text x="150" y="50" class="g" fill="#9A3412">📧 Groupware:</text>
  
  <!-- OX App Suite -->
  <g transform="translate(30, 60)">
    <rect width="111" height="111" rx="20" fill="white" stroke="#E5E7EB"/>
    <path d="M24 70 V42 L55 26 L86 42 V70 L55 86 Z" fill="#341291"/><path d="M55 26 V86 M24 42 L86 42 M24 56 L86 56" stroke="#571EFA" stroke-width="3"/>
    <text x="55" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280">OX</text>
  </g>
  
  <!-- SOGo -->
  <g transform="translate(165, 60)">
    <rect width="111" height="111" rx="20" fill="white" stroke="#E5E7EB"/>
    <path d="M30 40 H80 V80 H30Z" fill="#341291"/><path d="M30 40 H80 L55 58Z" fill="#571EFA"/><path d="M56 28 H82 V44 H56Z" fill="#571EFA"/>
    <text x="55" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280">SOGo</text>
  </g>
  
  <!-- Grommunio -->
  <g transform="translate(300, 60)">
    <rect width="111" height="111" rx="20" fill="white" stroke="#E5E7EB"/>
    <path d="M22 40 L55 24 L88 40 L88 70 L55 86 L22 70 Z" fill="#341291"/>
    <path d="M55 50 L55 70 M48 55 L62 65" fill="none" stroke="#571EFA" stroke-width="3"/>
    <text x="55" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280">Grom</text>
  </g>
  
  <!-- Pick one indicator -->
  <text x="150" y="190" text-anchor="middle" font-size="10" fill="#6B7280">↕ pick one</text>
  
  <!-- Video Section -->
  <text x="450" y="50" class="g" fill="#9A3412">📹 Video:</text>
  
  <!-- Jitsi -->
  <g transform="translate(330, 60)">
    <rect width="111" height="111" rx="20" fill="white" stroke="#E5E7EB"/>
    <path d="M20 30 H90 V70 H20Z" fill="#341291"/><path d="M26 36 H84 V64 H26Z" fill="#571EFA"/><path d="M46 44 L66 50 L46 56Z" fill="white"/>
    <text x="55" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280">Jitsi</text>
  </g>
  
  <!-- BBB -->
  <g transform="translate(465, 60)">
    <rect width="111" height="111" rx="20" fill="white" stroke="#E5E7EB"/>
    <path d="M22 42 H64 V86 H22Z" fill="#341291"/><path d="M46 42 H88 V86 H46Z" fill="#571EFA"/><path d="M22 42 H88 L64 26Z" fill="#571EFA"/>
    <text x="55" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280">BBB</text>
  </g>
  
  <!-- Pick one indicator -->
  <text x="450" y="190" text-anchor="middle" font-size="10" fill="#6B7280">↕ pick one</text>
  
  <!-- Files Section -->
  <text x="750" y="50" class="g" fill="#9A3412">📁 Files:</text>
  
  <!-- Nextcloud -->
  <g transform="translate(630, 60)">
    <rect width="111" height="111" rx="20" fill="white" stroke="#E5E7EB"/>
    <path d="M22 30 H88 V70 H22Z" fill="#341291"/><path d="M26 34 H84 V66 H26Z" fill="#571EFA"/><path d="M30 38 H80 V62 H30Z" fill="white"/>
    <text x="55" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280">NC</text>
  </g>
  
  <!-- OpenCloud -->
  <g transform="translate(765, 60)">
    <rect width="111" height="111" rx="20" fill="white" stroke="#E5E7EB"/>
    <path d="M22 42 H64 V86 H22Z" fill="#341291"/><path d="M46 42 H88 V86 H46Z" fill="#571EFA"/><path d="M22 42 H88 L64 26Z" fill="#571EFA"/>
    <text x="55" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280">OC</text>
  </g>
  
  <!-- Pick one indicator -->
  <text x="750" y="190" text-anchor="middle" font-size="10" fill="#6B7280">↕ pick one</text>
