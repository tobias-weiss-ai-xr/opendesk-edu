# Test attribute values for various affiliation combinations
# Used by integration tests to verify attribute mapping correctness

# Single affiliation scenarios
single_affiliations:
  student:
    eduPersonAffiliation: ["student"]
    eduPersonScopedAffiliation: ["student@example.edu"]
    expected_roles: ["student"]
  faculty:
    eduPersonAffiliation: ["faculty"]
    eduPersonScopedAffiliation: ["faculty@example.edu"]
    expected_roles: ["instructor"]
  teacher:
    eduPersonAffiliation: ["teacher"]
    eduPersonScopedAffiliation: ["teacher@example.edu"]
    expected_roles: ["instructor"]
  staff:
    eduPersonAffiliation: ["staff"]
    eduPersonScopedAffiliation: ["staff@example.edu"]
    expected_roles: ["staff"]
  employee:
    eduPersonAffiliation: ["employee"]
    eduPersonScopedAffiliation: ["employee@example.edu"]
    expected_roles: ["staff"]
  member:
    eduPersonAffiliation: ["member"]
    eduPersonScopedAffiliation: ["member@example.edu"]
    expected_roles: ["member"]
  affiliate:
    eduPersonAffiliation: ["affiliate"]
    eduPersonScopedAffiliation: ["affiliate@example.edu"]
    expected_roles: ["affiliate"]
  alum:
    eduPersonAffiliation: ["alum"]
    eduPersonScopedAffiliation: ["alum@example.edu"]
    expected_roles: ["alumni"]
  library-walk-in:
    eduPersonAffiliation: ["library-walk-in"]
    eduPersonScopedAffiliation: ["library-walk-in@example.edu"]
    expected_roles: ["library"]

# Multi-affiliation scenarios
multi_affiliations:
  student_staff:
    eduPersonAffiliation: ["student", "staff"]
    eduPersonScopedAffiliation: ["student@example.edu", "staff@example.edu"]
    expected_roles: ["student", "staff"]
  faculty_student:
    eduPersonAffiliation: ["faculty", "student"]
    eduPersonScopedAffiliation: ["faculty@example.edu", "student@example.edu"]
    expected_roles: ["instructor", "student"]
  all_affiliations:
    eduPersonAffiliation: ["faculty", "staff", "student", "member", "affiliate", "alum"]
    eduPersonScopedAffiliation:
      - "faculty@example.edu"
      - "staff@example.edu"
      - "student@example.edu"
      - "member@example.edu"
      - "affiliate@example.edu"
      - "alum@example.edu"
    expected_roles: ["instructor", "staff", "student", "member", "affiliate", "alumni"]

